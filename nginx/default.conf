log_format performance '$remote_addr - $request_method $request_uri $status '
                       'request_time=$request_time upstream_time=$upstream_response_time '
                       'bytes_sent=$bytes_sent request_length=$request_length';

server {
    listen 80;
    access_log /var/log/nginx/access.log performance;

    # ========== 大文件上传配置 ==========
    client_max_body_size 2G;           # 最大上传 2GB
    client_body_timeout 600s;          # 上传超时 10分钟
    proxy_read_timeout 600s;           # 后端处理超时 10分钟
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    # ===== SSE 路由：必须保持实时透传 =====
    location ~ ^/api/recruitment/(task-events|skills/generate-content|positions/[0-9]+/generate-jd/stream|chat/runs)(/|$) {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ===== 权限中心和招聘设置 JSON：允许 Nginx 正常缓冲并复用连接 =====
    location ~ ^/api/(admin/rbac|auth/session)(/|$) {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        proxy_cache off;
    }

    location ~ ^/api/recruitment/(metadata|organization-scope|skills|llm-configs|mail-senders|mail-recipients|mail-auto-config|resume-mail-dispatches)(/|$) {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        proxy_cache off;
    }

    # ===== Next.js API 路由 (优先匹配) =====
    # 这些路由由 Next.js BFF 处理，再由其内部决定是否转发到 FastAPI 或第三方服务
    location ~ ^/api/(admin|agent-chat|ai-resources|auth|extract-file|health-check|recruitment|resources|system|team-resources)(/|$) {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
    }

    # ===== FastAPI 后端 API =====
    # 其他 /api/ 请求由 FastAPI 处理
    location /api/ {
        proxy_pass http://fastapi:8091/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 大文件上传支持
        client_max_body_size 2G;
        proxy_request_buffering off;   # 不缓冲请求体，直接流式传输

        # SSE 流式响应支持
        proxy_buffering off;           # 不缓冲响应，实时推送 SSE 事件
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ===== 前端 (Next.js on port 3000) =====
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持 (用于 Next.js HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
